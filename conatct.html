<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pam Cakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <header class="site-header">
        <div class="container nav-container">
            <div class="logo">
                <img src="/pictures/logo.jpg" alt="Pam Cakes Logo">
            </div>

            <nav class="main-nav">
                <ul>
                    <li><a href="http://127.0.0.1:5500/index.html">Home</a></li>
                    <li><a href="http://127.0.0.1:5500/About.html">About</a></li>
                    <li><a href="http://127.0.0.1:5500/Conatct.html">Conatct</a></li>
                </ul>
            </nav>

            <a href="#" class="btn primary-btn">Place An Order</a>
        </div>
    </header>
    <section class="contact" id="contact">
    <div class="container">
        <header class="section-header">
            <h2>Contact Us</h2>
            <p>We’d love to hear from you! Send us a message below.</p>
        </header>

        <form id="contactForm" class="contact-form">
            
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn">Send Message</button>
        </form>
    </div>
</section>

<!-- Popup Modal -->
<div id="popup" class="popup" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="popup-content">
        <p>✅ Your message has been sent!</p>
        <button id="closePopup" class="btn">Close</button>
    </div>
</div>
<script src="/app.js"></script>
</body>
</html>
